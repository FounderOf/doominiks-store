<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMINIKS STORE - Premium Digital Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        
        :root {
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --bg-dark: #0a0a0b;
            --bg-card: #111113;
            --bg-card-hover: #18181b;
            --border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
        }

        /* ===== LIGHT MODE ===== */
        body.light-mode {
            --bg-dark: #f4f4f5;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f1f3;
            --border: #e4e4e7;
            --text-primary: #09090b;
            --text-secondary: #71717a;
        }
        body.light-mode header {
            background: rgba(244,244,245,0.85) !important;
            border-color: #e4e4e7 !important;
        }
        body.light-mode .input-field {
            background: #f4f4f5;
            color: #09090b;
        }
        body.light-mode .modal-content {
            background: #ffffff;
        }
        body.light-mode .chat-box {
            background: #ffffff;
        }
        body.light-mode #loading-screen {
            background: linear-gradient(135deg, #f4f4f5 0%, #e4e4e7 50%, #f4f4f5 100%);
        }
        body.light-mode .loader-logo {
            background: linear-gradient(135deg, #09090b 0%, #dc2626 50%, #09090b 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
        }
        body.light-mode .bg-zinc-900 { background-color: #f1f5f9 !important; }
        body.light-mode .bg-zinc-800 { background-color: #e2e8f0 !important; }
        body.light-mode .text-zinc-400 { color: #64748b !important; }
        body.light-mode .text-zinc-500 { color: #94a3b8 !important; }
        body.light-mode .text-zinc-600 { color: #71717a !important; }
        body.light-mode .border-zinc-800 { border-color: #e2e8f0 !important; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== TOAST NOTIFICATION ===== */
        #toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 280px;
            max-width: 360px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            pointer-events: all;
            animation: toastIn 0.35s cubic-bezier(.21,1.04,.67,1) forwards;
            border: 1px solid transparent;
        }
        .toast.hide { animation: toastOut 0.3s ease forwards; }
        .toast-success { background: #052e16; border-color: #16a34a; color: #86efac; }
        .toast-error   { background: #450a0a; border-color: #dc2626; color: #fca5a5; }
        .toast-info    { background: #0c1a2e; border-color: #3b82f6; color: #93c5fd; }
        .toast-warn    { background: #1c1400; border-color: #f59e0b; color: #fcd34d; }
        body.light-mode .toast-success { background: #dcfce7; border-color: #16a34a; color: #166534; }
        body.light-mode .toast-error   { background: #fee2e2; border-color: #dc2626; color: #991b1b; }
        body.light-mode .toast-info    { background: #dbeafe; border-color: #3b82f6; color: #1e40af; }
        body.light-mode .toast-warn    { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
        @keyframes toastIn  { from { opacity:0; transform:translateX(60px) scale(.9); } to { opacity:1; transform:translateX(0) scale(1); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(60px); } }

        /* ===== WISHLIST HEART ===== */
        .wishlist-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 2;
        }
        .wishlist-btn:hover { transform: scale(1.15); }
        .wishlist-btn.wishlisted { background: rgba(220,38,38,0.85); }
        .wishlist-btn i { font-size: 0.85rem; color: white; }

        /* ===== THEME TOGGLE BUTTON ===== */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .theme-toggle:hover { border-color: #dc2626; transform: rotate(20deg); }

        /* Professional Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0a0b 0%, #1a1a1d 50%, #0a0a0b 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loader-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #dc2626 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
            margin-bottom: 3rem;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .loader-container {
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .loader-bar-bg {
            width: 100%;
            height: 4px;
            background: #27272a;
            border-radius: 4px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #dc2626, #f87171, #dc2626);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: loadProgress 2s ease-out forwards, barShimmer 1s linear infinite;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            20% { width: 20%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes barShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            letter-spacing: 0.1em;
        }

        .loader-dots::after {
            content: '';
            animation: dots 1.5s steps(4) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        /* Card Styles */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: #3f3f46;
            transform: translateY(-2px);
        }

        .card-glow {
            box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.1), 
                        0 4px 20px rgba(220, 38, 38, 0.1);
        }

        .card-glow:hover {
            box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.2), 
                        0 8px 30px rgba(220, 38, 38, 0.15);
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
        }

        .btn-primary:disabled {
            background: #3f3f46;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: #dc2626;
        }

        /* Input Styles */
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        /* Navigation */
        .nav-item {
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .nav-item.active {
            color: #dc2626;
        }

        /* Badge Styles */
        .badge-owner {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-member { background: linear-gradient(135deg, #71717a, #52525b); }
        .badge-warrior { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .badge-elite { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .badge-master { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .badge-grandmaster { background: linear-gradient(135deg, #ec4899, #db2777); }
        .badge-mythical { background: linear-gradient(135deg, #f59e0b, #dc2626, #8b5cf6); }
        .badge-paradise {
            background: linear-gradient(135deg, #06b6d4, #a855f7, #f59e0b);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            animation: paradiseGlow 2s ease-in-out infinite;
        }

        @keyframes paradiseGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(168, 85, 247, 0.5); }
            50% { box-shadow: 0 0 18px rgba(6, 182, 212, 0.7), 0 0 30px rgba(168, 85, 247, 0.4); }
        }

        .badge-member, .badge-warrior, .badge-elite, .badge-master, .badge-grandmaster, .badge-mythical, .badge-paradise {
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Product Card */
        .product-card {
            position: relative;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            background: linear-gradient(135deg, #27272a, #18181b);
        }

        .discount-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #dc2626;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .stock-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
        }

        .stock-low { color: #f87171; }
        .stock-out { background: #dc2626; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
        }

        .chat-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
            transition: all 0.3s ease;
        }

        .chat-btn:hover {
            transform: scale(1.1);
        }

        .chat-box {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 380px;
            height: 500px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-box.active {
            display: flex;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        /* Payment Steps */
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .step {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            background: var(--border);
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .step.active {
            background: #dc2626;
            color: white;
        }

        .step.completed {
            background: #22c55e;
            color: white;
        }

        .step-line {
            width: 60px;
            height: 2px;
            background: var(--border);
        }

        .step-line.active {
            background: #dc2626;
        }

        /* Rating Stars */
        .star-rating {
            display: flex;
            gap: 0.25rem;
        }

        .star {
            font-size: 1.25rem;
            color: #3f3f46;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star.active, .star:hover {
            color: #fbbf24;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-pulse {
            animation: pulse 2s infinite;
        }

        /* Hide scrollbar for chat */
        .chat-messages {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .chat-messages::-webkit-scrollbar {
            display: none;
        }

        /* Tab Styles */
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .tab-btn.active {
            color: #dc2626;
            background: rgba(220, 38, 38, 0.1);
            border-color: rgba(220, 38, 38, 0.3);
        }

        /* Status Badges */
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-processing { background: #3b82f620; color: #3b82f6; }
        .status-shipped { background: #8b5cf620; color: #8b5cf6; }
        .status-completed { background: #22c55e20; color: #22c55e; }
        .status-cancelled { background: #ef444420; color: #ef4444; }

        [class*="status-"] {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* File Upload */
        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload:hover {
            border-color: #dc2626;
            background: rgba(220, 38, 38, 0.05);
        }

        .file-upload.has-file {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        /* QR Code Style */
        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-logo">DOOMINIKS STORE</div>
        <div class="loader-container">
            <div class="loader-bar-bg">
                <div class="loader-bar"></div>
            </div>
            <p class="loader-text">MEMUAT<span class="loader-dots"></span></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-[#0a0a0b]/80 backdrop-blur-xl border-b border-[#27272a]">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-8">
                        <h1 class="text-2xl font-bold cursor-pointer" onclick="showPage('home')" style="font-family: 'Space Grotesk', sans-serif;">
                            <span class="text-white">DOOMINIKS</span>
                            <span class="text-red-500">STORE</span>
                        </h1>
                        <nav class="hidden md:flex items-center gap-1" id="main-nav">
                            <div class="nav-item active" onclick="showPage('home')">
                                <i class="fas fa-home mr-2"></i>Beranda
                            </div>
                            <div class="nav-item" onclick="showPage('products')">
                                <i class="fas fa-shopping-bag mr-2"></i>Produk
                            </div>
                            <div class="nav-item" onclick="showPage('topup')">
                                <i class="fas fa-coins mr-2"></i>Top Up
                            </div>
                            <div class="nav-item" onclick="showPage('reviews')">
                                <i class="fas fa-star mr-2"></i>Ulasan
                            </div>
                            <div class="nav-item" onclick="showPage('discord')">
                                <i class="fab fa-discord mr-2"></i>Discord
                            </div>
                        </nav>
                    </div>
                    <div class="flex items-center gap-3">
                        <!-- Theme Toggle -->
                        <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Ganti tema">
                            <i class="fas fa-moon" id="theme-icon"></i>
                        </button>
                        <div id="auth-buttons" class="flex items-center gap-3">
                            <button class="btn-secondary text-sm" onclick="showModal('login')">Masuk</button>
                            <button class="btn-primary text-sm" onclick="showModal('register')">Daftar</button>
                        </div>
                        <div id="user-menu" class="hidden items-center gap-4">
                            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('profile')">
                                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center font-bold" id="user-avatar">D</div>
                                <div class="hidden sm:block">
                                    <p class="font-semibold text-sm" id="header-username">User</p>
                                    <p class="text-xs text-zinc-400" id="header-balance">Rp 0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="max-w-7xl mx-auto px-4 py-8" id="page-content">
            <!-- Content loaded dynamically -->
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modals"></div>

    <!-- Chat Widget -->
    <div class="chat-widget" id="chat-widget" style="display: none;">
        <div class="chat-box" id="chat-box">
            <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
                <div>
                    <h3 class="font-semibold">Chat Support</h3>
                    <p class="text-xs text-zinc-400">Biasanya membalas dalam beberapa menit</p>
                </div>
                <button onclick="toggleChat()" class="text-zinc-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 chat-messages" id="chat-messages">
                <div class="flex justify-start">
                    <div class="bg-zinc-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[80%]">
                        <p class="text-sm">Halo! Ada yang bisa kami bantu? 😊</p>
                        <p class="text-xs text-zinc-500 mt-1">Admin</p>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-zinc-800">
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Ketik pesan..." class="input-field flex-1 text-sm py-2" onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()" class="btn-primary px-4 py-2">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
        <button class="chat-btn" onclick="toggleChat()">
            <i class="fas fa-comments text-white text-xl"></i>
        </button>
    </div>

    <script>
        // ===================== DATA STORE =====================
        let store = {
            users: {},
            products: [
                { id: 1, name: "Mobile Legends Diamonds 100", category: "game", price: 25000, stock: 50, image: "", description: "100 Diamonds ML instant", discount: 0 },
                { id: 2, name: "PUBG Mobile UC 600", category: "game", price: 150000, stock: 30, image: "", description: "600 UC PUBGM instant", discount: 10 },
                { id: 3, name: "Free Fire Diamonds 500", category: "game", price: 75000, stock: 40, image: "", description: "500 Diamonds FF instant", discount: 0 },
                { id: 4, name: "Akun Netflix Premium", category: "akun", price: 50000, stock: 20, image: "", description: "Akun Netflix 1 bulan", discount: 15 },
                { id: 5, name: "Akun Spotify Premium", category: "akun", price: 25000, stock: 25, image: "", description: "Akun Spotify 1 bulan", discount: 0 },
                { id: 6, name: "Joki Rank ML Mythic", category: "joki", price: 200000, stock: 10, image: "", description: "Joki sampai Mythic", discount: 20 },
                { id: 7, name: "Voucher Google Play 50K", category: "voucher", price: 52000, stock: 100, image: "", description: "Kode voucher GP 50K", discount: 0 },
                { id: 8, name: "Steam Wallet 100K", category: "voucher", price: 105000, stock: 50, image: "", description: "Steam Wallet IDR 100K", discount: 5 }
            ],
            orders: [],
            reviews: [],
            transactions: [],
            orderLogs: [],
            chats: {},
            settings: {
                ownerUsername: "doominiks",
                ownerPassword: "admin123",
                discordLink: "https://discord.gg/doominiks",
                bankName: "BCA",
                bankNumber: "1234567890",
                bankHolder: "DOOMINIKS STORE",
                ewalletDANA: "081234567890",
                ewalletOVO: "081234567890",
                ewalletGoPay: "081234567890",
                ewalletShopeePay: "081234567890"
            },
            currentUser: null,
            nextOrderId: 1001,
            coinPackages: [
                { id: 1, coins: 100, price: 10000, bonus: 0 },
                { id: 2, coins: 250, price: 25000, bonus: 5 },
                { id: 3, coins: 500, price: 50000, bonus: 10 },
                { id: 4, coins: 1000, price: 95000, bonus: 15 },
                { id: 5, coins: 2500, price: 225000, bonus: 20 },
                { id: 6, coins: 5000, price: 400000, bonus: 30 }
            ],
            depositPackages: [
                { id: 1, amount: 50000, price: 50000 },
                { id: 2, amount: 100000, price: 100000 },
                { id: 3, amount: 250000, price: 250000 },
                { id: 4, amount: 500000, price: 500000 },
                { id: 5, amount: 1000000, price: 1000000 },
                { id: 6, amount: 2000000, price: 2000000 }
            ]
        };

        // Load from localStorage
        function loadStore() {
            const saved = localStorage.getItem('doominiks_store');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    const defaultProducts = store.products.slice();
                    const defaultCoinPkgs = store.coinPackages.slice();
                    const defaultDepositPkgs = store.depositPackages.slice();
                    store = Object.assign({}, store, parsed, {
                        users: parsed.users || {},
                        orders: Array.isArray(parsed.orders) ? parsed.orders : [],
                        transactions: Array.isArray(parsed.transactions) ? parsed.transactions : [],
                        reviews: Array.isArray(parsed.reviews) ? parsed.reviews : [],
                        chats: parsed.chats || {},
                        orderLogs: Array.isArray(parsed.orderLogs) ? parsed.orderLogs : [],
                        products: (parsed.products && parsed.products.length > 0) ? parsed.products : defaultProducts,
                        coinPackages: (parsed.coinPackages && parsed.coinPackages.length > 0) ? parsed.coinPackages : defaultCoinPkgs,
                        depositPackages: (parsed.depositPackages && parsed.depositPackages.length > 0) ? parsed.depositPackages : defaultDepositPkgs,
                        settings: Object.assign({}, store.settings, parsed.settings || {}),
                        currentUser: (() => {
                            // Prioritaskan session yang tersimpan terpisah (persistent login)
                            const savedSession = localStorage.getItem('doominiks_session');
                            if (savedSession && (parsed.users || {})[savedSession]) return savedSession;
                            return parsed.hasOwnProperty('currentUser') ? parsed.currentUser : null;
                        })(),
                        nextOrderId: parsed.nextOrderId || store.nextOrderId,
                    });
                } catch(e) {
                    console.error('Failed to load store:', e);
                }
            }
        }

        function saveStore() {
            localStorage.setItem('doominiks_store', JSON.stringify(store));
            // Simpan session user secara terpisah agar tetap login setelah refresh/tutup tab
            if (store.currentUser) {
                localStorage.setItem('doominiks_session', store.currentUser);
            } else {
                localStorage.removeItem('doominiks_session');
            }
        }

        // ===================== INITIALIZATION =====================
        document.addEventListener('DOMContentLoaded', () => {
            loadStore();
            
            // Loading screen
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                document.getElementById('loading-screen').style.visibility = 'hidden';
                document.getElementById('app').classList.remove('hidden');
                
                // Check if user is logged in
                if (store.currentUser) {
                    updateUIForLoggedInUser();
                }
                
                showPage('home');
            }, 2500);
        });

        // ===================== NAVIGATION =====================
        function showPage(page) {
            const content = document.getElementById('page-content');
            
            // Update nav
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const navItems = document.querySelectorAll('.nav-item');
            const pageIndex = ['home', 'products', 'topup', 'reviews', 'discord'].indexOf(page);
            if (pageIndex >= 0 && navItems[pageIndex]) {
                navItems[pageIndex].classList.add('active');
            }
            
            switch(page) {
                case 'home': content.innerHTML = renderHome(); break;
                case 'products': content.innerHTML = renderProducts(); break;
                case 'topup': content.innerHTML = renderTopUp(); break;
                case 'reviews': content.innerHTML = renderReviews(); break;
                case 'discord': content.innerHTML = renderDiscord(); break;
                case 'profile': content.innerHTML = renderProfile(); break;
                case 'orders': content.innerHTML = renderOrders(); break;
                case 'owner': content.innerHTML = renderOwnerPanel(); break;
                case 'wishlist': content.innerHTML = renderWishlistPage(); break;
                default: content.innerHTML = renderHome();
            }
        }

        // ===================== RENDER PAGES =====================
        function renderHome() {
            const featuredProducts = store.products.slice(0, 4);
            const recentReviews = store.reviews.slice(-3).reverse();
            
            return `
                <div class="fade-in">
                    <!-- Hero Section -->
                    <section class="text-center py-16 mb-12">
                        <h1 class="text-5xl md:text-6xl font-bold mb-6" style="font-family: 'Space Grotesk', sans-serif;">
                            <span class="text-white">Selamat Datang di</span><br>
                            <span class="bg-gradient-to-r from-red-500 to-red-400 bg-clip-text text-transparent">DOOMINIKS STORE</span>
                        </h1>
                        <p class="text-zinc-400 text-lg max-w-2xl mx-auto mb-8">
                            Toko digital terpercaya untuk semua kebutuhan gaming dan digital Anda. Proses cepat, harga terbaik!
                        </p>
                        <div class="flex justify-center gap-4">
                            <button onclick="showPage('products')" class="btn-primary">
                                <i class="fas fa-shopping-bag mr-2"></i>Lihat Produk
                            </button>
                            <button onclick="window.open('${store.settings.discordLink}')" class="btn-secondary">
                                <i class="fab fa-discord mr-2"></i>Join Discord
                            </button>
                        </div>
                    </section>

                    <!-- Stats -->
                    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                        <div class="card card-glow p-6 text-center">
                            <i class="fas fa-box text-3xl text-red-500 mb-3"></i>
                            <h3 class="text-2xl font-bold">${store.products.length}</h3>
                            <p class="text-zinc-400 text-sm">Produk</p>
                        </div>
                        <div class="card card-glow p-6 text-center">
                            <i class="fas fa-users text-3xl text-red-500 mb-3"></i>
                            <h3 class="text-2xl font-bold">${Object.keys(store.users).length}</h3>
                            <p class="text-zinc-400 text-sm">Member</p>
                        </div>
                        <div class="card card-glow p-6 text-center">
                            <i class="fas fa-shopping-cart text-3xl text-red-500 mb-3"></i>
                            <h3 class="text-2xl font-bold">${store.orders.length}</h3>
                            <p class="text-zinc-400 text-sm">Transaksi</p>
                        </div>
                        <div class="card card-glow p-6 text-center">
                            <i class="fas fa-star text-3xl text-red-500 mb-3"></i>
                            <h3 class="text-2xl font-bold">${store.reviews.length > 0 ? (store.reviews.reduce((a,b) => a + b.rating, 0) / store.reviews.length).toFixed(1) : '5.0'}</h3>
                            <p class="text-zinc-400 text-sm">Rating</p>
                        </div>
                    </section>

                    <!-- Featured Products -->
                    <section class="mb-12">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold">Produk Populer</h2>
                            <button onclick="showPage('products')" class="text-red-500 hover:text-red-400 font-medium">
                                Lihat Semua <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${featuredProducts.map(p => renderProductCard(p)).join('')}
                        </div>
                    </section>

                    <!-- Recent Reviews -->
                    <section>
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold">Ulasan Terbaru</h2>
                            <button onclick="showPage('reviews')" class="text-red-500 hover:text-red-400 font-medium">
                                Lihat Semua <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${recentReviews.length > 0 ? recentReviews.map(r => `
                                <div class="card card-glow p-6">
                                    <div class="flex items-center gap-3 mb-4">
                                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center font-bold">
                                            ${r.username[0].toUpperCase()}
                                        </div>
                                        <div>
                                            <p class="font-semibold">${r.username}</p>
                                            <div class="flex gap-1">
                                                ${[1,2,3,4,5].map(i => `<i class="fas fa-star text-xs ${i <= r.rating ? 'text-yellow-400' : 'text-zinc-600'}"></i>`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                    <p class="text-zinc-400 text-sm">"${r.comment}"</p>
                                    <p class="text-zinc-600 text-xs mt-3">${new Date(r.date).toLocaleDateString('id-ID')}</p>
                                </div>
                            `).join('') : `
                                <div class="col-span-3 text-center py-12 text-zinc-500">
                                    <i class="fas fa-star text-4xl mb-4"></i>
                                    <p>Belum ada ulasan</p>
                                </div>
                            `}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderProductCard(product) {
            const finalPrice = product.discount > 0 ? Math.round(product.price * (100 - product.discount) / 100) : product.price;
            const coinPrice = Math.round(finalPrice / 100);
            const isWishlisted = store.currentUser && (store.users[store.currentUser]?.wishlist || []).includes(product.id);
            const isOutOfStock = product.stock <= 0;
            const isLowStock = product.stock > 0 && product.stock <= 5;
            
            return `
                <div class="card card-glow product-card p-4 cursor-pointer" onclick="showProductDetail(${product.id})">
                    ${product.discount > 0 ? `<div class="discount-badge">-${product.discount}%</div>` : ''}
                    <div class="stock-badge ${isLowStock ? 'stock-low' : ''} ${isOutOfStock ? 'stock-out' : ''}" 
                         style="left:auto;right:12px;top:12px;"
                         data-stock-product="${product.id}">
                        ${isOutOfStock ? 'Habis' : `Stok: ${product.stock}`}
                    </div>
                    <!-- Wishlist button -->
                    <button class="wishlist-btn ${isWishlisted ? 'wishlisted' : ''}" 
                        onclick="event.stopPropagation(); toggleWishlist(${product.id}, this)" 
                        title="${isWishlisted ? 'Hapus dari Wishlist' : 'Tambah ke Wishlist'}">
                        <i class="fa${isWishlisted ? 's' : 'r'} fa-heart"></i>
                    </button>
                    ${product.image ? 
                        `<img src="${product.image}" class="product-image mb-4" alt="${product.name}">` :
                        `<div class="product-image mb-4 flex items-center justify-center">
                            <i class="fas fa-box-open text-4xl text-zinc-600"></i>
                        </div>`
                    }
                    <h3 class="font-semibold mb-2 line-clamp-2">${product.name}</h3>
                    <p class="text-zinc-400 text-sm mb-3 line-clamp-1">${product.description}</p>
                    <div class="flex items-center justify-between">
                        <div>
                            ${product.discount > 0 ? `<p class="text-zinc-500 text-xs line-through">Rp ${product.price.toLocaleString('id-ID')}</p>` : ''}
                            <p class="text-red-500 font-bold">Rp ${finalPrice.toLocaleString('id-ID')}</p>
                            <p class="text-yellow-500 text-xs">${coinPrice} Coins</p>
                        </div>
                        <button class="btn-primary text-sm px-3 py-2" data-buy-product="${product.id}" ${isOutOfStock ? 'disabled' : ''}>
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderProducts() {
            const categories = ['all', 'game', 'akun', 'joki', 'voucher'];
            
            return `
                <div class="fade-in">
                    <h1 class="text-3xl font-bold mb-8">Semua Produk</h1>
                    
                    <!-- Category Filter -->
                    <div class="flex flex-wrap gap-2 mb-8">
                        ${categories.map(cat => `
                            <button class="tab-btn ${cat === 'all' ? 'active' : ''}" onclick="filterProducts('${cat}', this)">
                                ${cat === 'all' ? 'Semua' : cat.charAt(0).toUpperCase() + cat.slice(1)}
                            </button>
                        `).join('')}
                    </div>
                    
                    <!-- Products Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid">
                        ${store.products.map(p => renderProductCard(p)).join('')}
                    </div>
                </div>
            `;
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filtered = category === 'all' ? store.products : store.products.filter(p => p.category === category);
            document.getElementById('products-grid').innerHTML = filtered.map(p => renderProductCard(p)).join('');
        }

        function renderTopUp() {
            return `
                <div class="fade-in">
                    <h1 class="text-3xl font-bold mb-8">Top Up & Deposit</h1>
                    
                    <div class="grid md:grid-cols-2 gap-8">
                        <!-- Coin Top Up -->
                        <div>
                            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                                <i class="fas fa-coins text-yellow-500"></i> Top Up Coin
                            </h2>
                            <div class="grid gap-4">
                                ${store.coinPackages.map(pkg => `
                                    <div class="card card-glow p-4 flex items-center justify-between cursor-pointer hover:border-red-500" onclick="buyCoins(${pkg.id})">
                                        <div class="flex items-center gap-4">
                                            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-yellow-500/20 to-yellow-600/20 flex items-center justify-center">
                                                <i class="fas fa-coins text-yellow-500 text-xl"></i>
                                            </div>
                                            <div>
                                                <p class="font-semibold">${pkg.coins.toLocaleString()} Coins</p>
                                                ${pkg.bonus > 0 ? `<p class="text-green-500 text-sm">+${pkg.bonus}% Bonus</p>` : '<p class="text-zinc-500 text-sm">Paket Dasar</p>'}
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-bold text-red-500">Rp ${pkg.price.toLocaleString('id-ID')}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <!-- Deposit Saldo -->
                        <div>
                            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                                <i class="fas fa-wallet text-green-500"></i> Deposit Saldo
                            </h2>
                            <div class="grid gap-4">
                                ${store.depositPackages.map(pkg => `
                                    <div class="card card-glow p-4 flex items-center justify-between cursor-pointer hover:border-red-500" onclick="depositSaldo(${pkg.id})">
                                        <div class="flex items-center gap-4">
                                            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-green-500/20 to-green-600/20 flex items-center justify-center">
                                                <i class="fas fa-wallet text-green-500 text-xl"></i>
                                            </div>
                                            <div>
                                                <p class="font-semibold">Rp ${pkg.amount.toLocaleString('id-ID')}</p>
                                                <p class="text-zinc-500 text-sm">Saldo IDR</p>
                                            </div>
                                        </div>
                                        <button class="btn-primary text-sm px-4">Deposit</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderReviews() {
            const userAlreadyReviewed = store.currentUser && store.reviews.some(r => r.username === store.currentUser);
            const avgRating = store.reviews.length > 0
                ? (store.reviews.reduce((a,b) => a + b.rating, 0) / store.reviews.length).toFixed(1)
                : '0';
            const totalReviews = store.reviews.length;
            const roundedAvg = Math.round(parseFloat(avgRating));
            
            // Distribusi bintang
            const starCounts = [5,4,3,2,1].map(s => ({
                star: s,
                count: store.reviews.filter(r => r.rating === s).length,
                pct: totalReviews > 0 ? Math.round(store.reviews.filter(r => r.rating === s).length / totalReviews * 100) : 0
            }));

            return `
                <div class="fade-in">
                    <h1 class="text-3xl font-bold mb-8">Ulasan Pelanggan</h1>

                    <!-- Rating Summary Card - tampil untuk semua orang -->
                    <div class="card card-glow p-6 mb-8">
                        <div class="flex flex-col sm:flex-row items-center gap-8">
                            <!-- Angka rata-rata -->
                            <div class="text-center flex-shrink-0">
                                <p class="text-6xl font-bold text-yellow-400">${avgRating}</p>
                                <div class="flex gap-1 justify-center my-2">
                                    ${[1,2,3,4,5].map(i => `<i class="fas fa-star text-lg ${i <= roundedAvg ? 'text-yellow-400' : 'text-zinc-700'}"></i>`).join('')}
                                </div>
                                <p class="text-zinc-400 text-sm">${totalReviews} ulasan</p>
                            </div>
                            <!-- Bar distribusi -->
                            <div class="flex-1 w-full space-y-2">
                                ${starCounts.map(s => `
                                    <div class="flex items-center gap-3 text-sm">
                                        <span class="text-zinc-400 w-3 text-right">${s.star}</span>
                                        <i class="fas fa-star text-yellow-400 text-xs"></i>
                                        <div class="flex-1 bg-zinc-800 rounded-full h-2.5 overflow-hidden">
                                            <div class="h-full rounded-full transition-all duration-700" 
                                                 style="width:${s.pct}%; background: linear-gradient(90deg, #facc15, #f59e0b)"></div>
                                        </div>
                                        <span class="text-zinc-500 w-6 text-right">${s.count}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Form Tulis Ulasan -->
                    ${store.currentUser ? (
                        userAlreadyReviewed ? `
                        <div class="card card-glow p-5 mb-8 flex items-center gap-4 border-green-500/30">
                            <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-check text-green-500"></i>
                            </div>
                            <div>
                                <p class="font-semibold text-green-400">Ulasan Anda sudah dikirim!</p>
                                <p class="text-zinc-400 text-sm">Terima kasih! Setiap akun hanya bisa memberikan satu ulasan.</p>
                            </div>
                        </div>
                        ` : `
                        <div class="card card-glow p-6 mb-8">
                            <h3 class="font-semibold mb-4"><i class="fas fa-pen mr-2 text-red-500"></i>Tulis Ulasan Anda</h3>
                            <div class="mb-4">
                                <p class="text-sm text-zinc-400 mb-2">Rating</p>
                                <div class="star-rating" id="review-stars">
                                    ${[1,2,3,4,5].map(i => `<i class="fas fa-star star" data-rating="${i}" onclick="setRating(${i})"></i>`).join('')}
                                </div>
                            </div>
                            <textarea id="review-comment" class="input-field mb-4" rows="3" placeholder="Tulis pengalaman Anda berbelanja di DOOMINIKS STORE..."></textarea>
                            <button onclick="submitReview()" class="btn-primary">
                                <i class="fas fa-paper-plane mr-2"></i>Kirim Ulasan
                            </button>
                        </div>
                        `
                    ) : `
                        <div class="card card-glow p-6 mb-8 flex items-center justify-between gap-4">
                            <div>
                                <p class="font-semibold mb-1">Punya pengalaman belanja di sini?</p>
                                <p class="text-zinc-400 text-sm">Login dan bagikan ulasan Anda kepada pembeli lain!</p>
                            </div>
                            <button onclick="showModal('login')" class="btn-primary flex-shrink-0">
                                <i class="fas fa-star mr-2"></i>Tulis Ulasan
                            </button>
                        </div>
                    `}

                    <!-- Filter & Sort -->
                    ${totalReviews > 0 ? `
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
                        <p class="text-zinc-400 text-sm font-medium">
                            Menampilkan <span class="text-white font-semibold">${totalReviews}</span> ulasan
                        </p>
                        <div class="flex gap-2">
                            <button class="review-filter-btn tab-btn active text-xs py-1 px-3" onclick="filterReviews('all', this)">Semua</button>
                            <button class="review-filter-btn tab-btn text-xs py-1 px-3" onclick="filterReviews(5, this)">⭐ 5</button>
                            <button class="review-filter-btn tab-btn text-xs py-1 px-3" onclick="filterReviews(4, this)">⭐ 4</button>
                            <button class="review-filter-btn tab-btn text-xs py-1 px-3" onclick="filterReviews(3, this)">⭐ 3</button>
                        </div>
                    </div>
                    ` : ''}

                    <!-- Reviews List - PUBLIK, semua orang bisa lihat -->
                    <div id="reviews-list" class="grid gap-4">
                        ${totalReviews > 0 ? store.reviews.slice().reverse().map(r => renderReviewCard(r)).join('') : `
                            <div class="text-center py-16 text-zinc-500">

            if (!store.currentUser) return showToast('Silakan login terlebih dahulu!', 'warn');
            const comment = document.getElementById('review-comment').value.trim();
            if (!comment) return showToast('Tulis ulasan Anda terlebih dahulu!', 'warn');
            
            // Cek apakah user sudah pernah review
            const alreadyReviewed = store.reviews.some(r => r.username === store.currentUser);
            if (alreadyReviewed) {
                return showToast('Anda sudah pernah menulis ulasan! Setiap akun hanya bisa menulis satu ulasan.', 'warn');

            store.reviews.push({
                id: Date.now(),
                username: store.currentUser,
                rating: currentRating,
                comment: comment,

        function switchProfileTab(tab) {
            const ordersTab = document.getElementById('profile-tab-orders');

            const historyBtn = document.getElementById('tab-history-btn');
            const reviewsBtn = document.getElementById('tab-reviews-btn');
            
            // Sembunyikan semua
            [ordersTab, historyTab, reviewsTab].forEach(t => t && t.classList.add('hidden'));
            [ordersBtn, historyBtn, reviewsBtn].forEach(b => b && b.classList.remove('active'));
            
            if (tab === 'orders') {
                ordersTab.classList.remove('hidden');
                ordersBtn.classList.add('active');
            } else if (tab === 'history') {
                historyTab.classList.remove('hidden');
                historyBtn.classList.add('active');

                reviewsTab.classList.remove('hidden');
                reviewsBtn.classList.add('active');
            }

                'shipped': '🚚 Dikirim',

            return texts[status] || status;

        function confirmPayment(orderId) {
            const order = store.orders.find(o => o.id === orderId);
            if (order) {
                order.status = 'processing';
                store.orderLogs.push({
                    orderId, action: 'Pembayaran dikonfirmasi', date: new Date().toISOString(), by: 'Owner'
                });
                saveStore();
                showOwnerTab('orders', document.querySelector('.tab-btn.active'));
            }
        }

        function rejectPayment(orderId) {
            const order = store.orders.find(o => o.id === orderId);
            if (order) {
                order.status = 'cancelled';
                store.orderLogs.push({
                    orderId, action: 'Pembayaran ditolak', date: new Date().toISOString(), by: 'Owner'
                });
                saveStore();
                showOwnerTab('orders', document.querySelector('.tab-btn.active'));
            }
        }

        function shipOrder(orderId) {
            const order = store.orders.find(o => o.id === orderId);
            if (order) {
                order.status = 'shipped';
                store.orderLogs.push({
                    orderId, action: 'Pesanan dikirim', date: new Date().toISOString(), by: 'Owner'
                });
                saveStore();
                showOwnerTab('orders', document.querySelector('.tab-btn.active'));
            }
        }

        function saveOwnerAccount() {
            const newUsername = document.getElementById('set-owner-username').value.trim();
            const newPassword = document.getElementById('set-owner-password').value;
            
            if (newUsername && newUsername !== store.settings.ownerUsername) {
                // Update user data
                if (store.users[store.settings.ownerUsername]) {
                    store.users[newUsername] = store.users[store.settings.ownerUsername];
                    delete store.users[store.settings.ownerUsername];
                }
                store.settings.ownerUsername = newUsername;
                store.currentUser = newUsername;
            }
            
            if (newPassword) {
                store.settings.ownerPassword = newPassword;
                if (store.users[store.settings.ownerUsername]) {
                    store.users[store.settings.ownerUsername].password = newPassword;
                }
            }
            
            saveStore();
            updateUIForLoggedInUser();
            showToast('Pengaturan akun berhasil disimpan!', 'success');
        }

        function saveDiscordLink() {
            store.settings.discordLink = document.getElementById('set-discord').value.trim();
            saveStore();
            showToast('Link Discord berhasil disimpan!', 'success');
        }

        function saveBankSettings() {
            store.settings.bankName = document.getElementById('set-bank-name').value.trim();
            store.settings.bankNumber = document.getElementById('set-bank-number').value.trim();
            store.settings.bankHolder = document.getElementById('set-bank-holder').value.trim();

        function saveEwalletSettings() {
            store.settings.ewalletDANA = document.getElementById('set-dana').value.trim();
            store.settings.ewalletOVO = document.getElementById('set-ovo').value.trim();
            store.settings.ewalletGoPay = document.getElementById('set-gopay').value.trim();
            store.settings.ewalletShopeePay = document.getElementById('set-shopeepay').value.trim();
            saveStore();
            showToast('Pengaturan E-Wallet berhasil disimpan!', 'success');
        }

                    content = `

                                </div>
                                <p class="text-center text-zinc-400 mt-4">
                                    Belum punya akun? <a onclick="closeModal();showModal('register')" class="text-red-500 cursor-pointer">Daftar</a>
                                </p>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'register':
                    content = `
                        <div class="modal active" onclick="if(event.target===this)closeModal()">
                            <div class="modal-content p-8">
                                <h2 class="text-2xl font-bold mb-6 text-center">Daftar</h2>
                                <div class="space-y-4">
                                    <input type="text" id="register-username" placeholder="Username" class="input-field">

                                    <button onclick="doRegister()" class="btn-primary w-full">Daftar</button>

                                <p class="text-center text-zinc-400 mt-4">

                                </p>
                            </div>

                    `;
                    break;
                    
                case 'product-detail':
                    content = renderProductDetailModal(data);
                    break;
                    
                case 'payment':
                    content = renderPaymentModal(data);
                    break;
                    
                case 'payment-process':
                    content = renderPaymentProcessModal(data);
                    break;

                    content = renderAddProductModal(data);

                    content = renderGiftBadgeModal(data);
                    break;

            modals.innerHTML = content;

        function renderProductDetailModal(productId) {

            return `

                                <p class="text-2xl font-bold text-red-500">Rp ${finalPrice.toLocaleString('id-ID')}</p>
                                <p class="text-yellow-500 text-sm">${coinPrice} Coins</p>

        function renderPaymentModal(data) {
            const { productId, type, amount, coinAmount } = data;
            let product = null;
            let price = amount || 0;
            let title = '';
            
            if (type === 'product') {
                product = store.products.find(p => p.id === productId);
                price = product.discount > 0 ? Math.round(product.price * (100 - product.discount) / 100) : product.price;
                title = product.name;
            } else if (type === 'topup') {
                title = `Top Up ${coinAmount.toLocaleString()} Coins`;
            } else if (type === 'deposit') {
                title = `Deposit Rp ${amount.toLocaleString('id-ID')}`;
            }
            
            const coinPrice = Math.round(price / 100);
            const user = store.users[store.currentUser] || {};
            
            return `
                <div class="modal active" onclick="if(event.target===this)closeModal()">
                    <div class="modal-content p-6">
                        <div class="flex justify-between items-start mb-6">

                        <div class="bg-zinc-900 rounded-xl p-4 mb-6">
                            <p class="text-zinc-400 text-sm">Produk</p>
                            <p class="font-semibold">${title}</p>
                            <p class="text-red-500 font-bold text-lg">Rp ${price.toLocaleString('id-ID')}</p>
                        </div>
                        
                        <div class="space-y-3">
                            ${type === 'product' ? `
                                <!-- Saldo -->
                                <div class="card p-4 cursor-pointer hover:border-red-500 ${user.balance >= price ? '' : 'opacity-50'}" 
                                     onclick="${user.balance >= price ? `processPayment('saldo', ${JSON.stringify(data).replace(/"/g, '&quot;')})` : ''}">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center">
                                            <i class="fas fa-wallet text-green-500 text-xl"></i>
                                        </div>
                                        <div class="flex-1">
                                            <p class="font-semibold">Saldo IDR</p>
                                            <p class="text-sm text-zinc-400">Saldo: Rp ${(user.balance || 0).toLocaleString('id-ID')}</p>
                                        </div>
                                        <i class="fas fa-chevron-right text-zinc-500"></i>
                                    </div>
                                </div>
                                
                                <!-- Coin -->
                                <div class="card p-4 cursor-pointer hover:border-red-500 ${user.coins >= coinPrice ? '' : 'opacity-50'}"

        // ===================== ACTIONS =====================
        function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) return showToast('Isi semua field!', 'warn');
            
            // Check owner login
            if (username === store.settings.ownerUsername && password === store.settings.ownerPassword) {
                if (!store.users[username]) {
                    store.users[username] = { password, balance: 0, coins: 0, badges: [] };
                }
                store.currentUser = username;
                saveStore();
                closeModal();
                updateUIForLoggedInUser();
                showToast(`Selamat datang kembali, ${username}! 👑`, 'success');
                showPage('home');
                return;
            }
            
            // Check regular user
            if (store.users[username]) {
                if (store.users[username].password === password) {
                    store.currentUser = username;
                    saveStore();
                    closeModal();
                    updateUIForLoggedInUser();
                    showToast(`Selamat datang, ${username}! 🎉`, 'success');
                    showPage('home');
                } else {
                    showToast('Password salah!', 'error');
                }
            } else {
                showToast('User tidak ditemukan!', 'error');
            }
        }

        function doRegister() {
            const username = document.getElementById('register-username').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            
            if (!username || !password) return showToast('Isi semua field!', 'warn');
            if (password !== confirm) return showToast('Password tidak cocok!', 'error');
            if (store.users[username]) return showToast('Username sudah digunakan!', 'error');
            if (username.length < 3) return showToast('Username minimal 3 karakter!', 'warn');
            
            store.users[username] = {
                password,
                balance: 0,
                coins: 0,
                badges: [],
                wishlist: []
            };
            
            store.currentUser = username;
            saveStore();
            closeModal();
            updateUIForLoggedInUser();
            showToast(`Akun berhasil dibuat! Selamat datang, ${username} 🎊`, 'success');
            showPage('home');
        }

        function processPayment(method, data) {
            const user = store.users[store.currentUser];
            let product = null;
            let price = data.amount || 0;
            let title = '';
            
            if (data.type === 'product') {
                product = store.products.find(p => p.id === data.productId);
                price = product.discount > 0 ? Math.round(product.price * (100 - product.discount) / 100) : product.price;
                title = product.name;
            }
            
            if (method === 'saldo') {
                if (user.balance < price) return showToast('Saldo tidak cukup!', 'error');
                
                user.balance -= price;
                product.stock--;
                
                const order = {
                    id: store.nextOrderId++,
                    username: store.currentUser,
                    productId: product.id,
                    productName: product.name,
                    total: price,
                    paymentMethod: 'Saldo IDR',
                    status: 'processing',
                    date: new Date().toISOString()
                };
                
                store.orders.push(order);
                store.transactions.push({
                    username: store.currentUser,
                    type: `Pembelian: ${product.name}`,
                    amount: price,
                    date: new Date().toISOString()
                });
                store.orderLogs.push({
                    orderId: order.id,
                    action: 'Order dibuat (Bayar dengan Saldo)',
                    date: new Date().toISOString(),
                    by: store.currentUser
                });
                
                saveStore();
                closeModal();
                updateUIForLoggedInUser();
                updateStockUI(product.id);
                showToast('Pembayaran berhasil! Pesanan sedang diproses 🎉', 'success');
                showPage('orders');
                
            } else if (method === 'coin') {
                const coinPrice = data.coinPrice;
                if (user.coins < coinPrice) return showToast('Coin tidak cukup!', 'error');
                
                user.coins -= coinPrice;
                product.stock--;
                
                const order = {
                    id: store.nextOrderId++,
                    username: store.currentUser,
                    productId: product.id,
                    productName: product.name,
                    total: price,
                    paymentMethod: `${coinPrice} Coins`,
                    status: 'processing',
                    date: new Date().toISOString()
                };
                
                store.orders.push(order);
                store.transactions.push({
                    username: store.currentUser,
                    type: `Pembelian: ${product.name}`,
                    amount: price,
                    date: new Date().toISOString()
                });
                store.orderLogs.push({
                    orderId: order.id,
                    action: 'Order dibuat (Bayar dengan Coin)',
                    date: new Date().toISOString(),
                    by: store.currentUser
                });
                
                saveStore();
                closeModal();
                updateUIForLoggedInUser();
                updateStockUI(product.id);
                showToast('Pembayaran berhasil! Pesanan sedang diproses 🎉', 'success');
                showPage('orders');
            }
        }
