        function submitPaymentProof(data) {
            if (!uploadedProof) return showToast('Upload bukti transfer terlebih dahulu!', 'warn');
            
            let product = null;
            let title = data.title;
            let price = data.price;
            
            if (data.type === 'product') {
                product = store.products.find(p => p.id === data.productId);
                product.stock--;
            }
            
            const order = {
                id: store.nextOrderId++,
                username: store.currentUser,
                productId: data.productId || null,
                productName: title,
                total: price,
                paymentMethod: data.method.toUpperCase(),
                status: 'waiting_confirmation',
                proofImage: uploadedProof,
                date: new Date().toISOString()
            };
            
            store.orders.push(order);
            store.transactions.push({
                username: store.currentUser,
                type: title,
                amount: price,
                date: new Date().toISOString()
            });
            store.orderLogs.push({
                orderId: order.id,
                action: 'Order dibuat (Menunggu konfirmasi)',
                date: new Date().toISOString(),
                by: store.currentUser
            });
            
            // Handle top up and deposit
            if (data.type === 'topup') {
                order.coinAmount = data.coinAmount;
            } else if (data.type === 'deposit') {
                order.depositAmount = data.amount;
            }
            
            saveStore();
            closeModal();
            if (product) updateStockUI(product.id);
            showToast('Bukti pembayaran dikirim! Menunggu konfirmasi admin 📋', 'info');
            showPage('orders');
        }

        function showAddProductModal() {
            showModal('add-product', null);
        }

        function editProduct(productId) {
            const product = store.products.find(p => p.id === productId);
            if (product) showModal('add-product', product);
        }

        function saveProduct(productId) {
            const name = document.getElementById('product-name').value.trim();
            const category = document.getElementById('product-category').value;
            const price = parseInt(document.getElementById('product-price').value);
            const stock = parseInt(document.getElementById('product-stock').value);
            const discount = parseInt(document.getElementById('product-discount').value) || 0;
            const description = document.getElementById('product-description').value.trim();
            const image = document.getElementById('product-image').value;
            
            if (!name || !price) return showToast('Isi nama dan harga produk!', 'warn');
            
            if (productId) {
                // Edit
                const product = store.products.find(p => p.id === productId);
                if (product) {
                    product.name = name;
                    product.category = category;
                    product.price = price;
                    product.stock = stock;
                    product.discount = discount;
                    product.description = description;
                    product.image = image;
                }
            } else {
                // Add new
                store.products.push({
                    id: Date.now(),
                    name, category, price, stock, discount, description, image
                });
            }
            
            saveStore();
            closeModal();
            showOwnerTab('products', document.querySelector('.tab-btn.active'));
        }

        function deleteProduct(productId) {
            if (confirm('Hapus produk ini?')) {
                store.products = store.products.filter(p => p.id !== productId);
                saveStore();
                showOwnerTab('products', document.querySelector('.tab-btn.active'));
            }
        }

        function showGiftBadgeModal(username) {
            showModal('gift-badge', username);
        }

        function giftBadge(username, badge) {
            const user = store.users[username];
            if (!user) return;
            
            if (!user.badges) user.badges = [];
            if (!user.badges.includes(badge)) {
                user.badges.push(badge);
                saveStore();
                showModal('gift-badge', username);
                showToast(`Badge ${badge} berhasil diberikan ke ${username}! 🎖️`, 'success');
            }
        }

        function removeBadge(username, badge) {
            const user = store.users[username];
            if (!user || !user.badges) return;
            
            user.badges = user.badges.filter(b => b !== badge);
            saveStore();
            showModal('gift-badge', username);
        }

        // ===================== CHAT =====================
        function toggleChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.classList.toggle('active');
        }

        function loadUserChat() {
            if (!store.currentUser) return;
            
            const messages = store.chats[store.currentUser] || [];
            const container = document.getElementById('chat-messages');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="flex justify-start">
                        <div class="bg-zinc-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[80%]">
                            <p class="text-sm">Halo ${store.currentUser}! Ada yang bisa kami bantu? 😊</p>
                            <p class="text-xs text-zinc-500 mt-1">Admin</p>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = messages.map(m => `
                    <div class="flex ${m.from === 'admin' ? 'justify-start' : 'justify-end'}">
                        <div class="${m.from === 'admin' ? 'bg-zinc-800 rounded-tl-sm' : 'bg-red-600 rounded-tr-sm'} rounded-2xl px-4 py-2 max-w-[80%]">
                            <p class="text-sm">${m.text}</p>
                            <p class="text-xs ${m.from === 'admin' ? 'text-zinc-500' : 'text-red-300'} mt-1">${m.from === 'admin' ? 'Admin' : 'Anda'}</p>
                        </div>
                    </div>
                `).join('');
            }
            
            container.scrollTop = container.scrollHeight;
        }

        function sendChat() {
            if (!store.currentUser) return;
            
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            if (!store.chats[store.currentUser]) store.chats[store.currentUser] = [];
            store.chats[store.currentUser].push({
                from: 'user',
                text: text,
                date: new Date().toISOString()
            });
            
            saveStore();
            input.value = '';
            loadUserChat();
        }

        // Initialize owner account
        if (!store.users[store.settings.ownerUsername]) {
            store.users[store.settings.ownerUsername] = {
                password: store.settings.ownerPassword,
                balance: 0,
                coins: 0,
                badges: []
            };
            saveStore();
        }

        // ===================== REAL-TIME STOCK UPDATE =====================
        function updateStockUI(productId) {
            const product = store.products.find(p => p.id === productId);
            if (!product) return;

            // Update semua elemen stok yang tampil di halaman (kartu produk)
            document.querySelectorAll(`[data-stock-product="${productId}"]`).forEach(el => {
                const stockText = product.stock <= 0 ? 'Habis' : `Stok: ${product.stock}`;
                el.textContent = stockText;
                el.className = `stock-badge ${product.stock <= 5 && product.stock > 0 ? 'stock-low' : ''} ${product.stock <= 0 ? 'stock-out' : ''}`;
                el.style.cssText = 'left:auto;right:12px;top:12px;';
            });

            // Update tombol beli di kartu
            document.querySelectorAll(`[data-buy-product="${productId}"]`).forEach(btn => {
                btn.disabled = product.stock <= 0;
            });

            // Kalau halaman produk sedang terbuka, re-render grid
            const grid = document.getElementById('products-grid');
            if (grid) {
                const activeFilter = document.querySelector('.tab-btn.active');
                const cat = activeFilter ? activeFilter.textContent.trim().toLowerCase() : 'all';
                const filtered = (cat === 'semua' || cat === 'all')
                    ? store.products
                    : store.products.filter(p => p.category === cat);
                grid.innerHTML = filtered.map(p => renderProductCard(p)).join('');
            }
        }
        function showToast(message, type = 'info', duration = 3500) {
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warn: 'fa-exclamation-triangle' };
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, duration);
        }

        // Intercept alert() with toast globally (optional – keep native alert for confirm dialogs)
        const _nativeAlert = window.alert.bind(window);
        window.showToast = showToast;

        // ===================== DARK / LIGHT MODE =====================
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('doominiks_theme', isLight ? 'light' : 'dark');
            showToast(isLight ? 'Mode terang aktif ☀️' : 'Mode gelap aktif 🌙', 'info', 2000);
        }

        function initTheme() {
            const saved = localStorage.getItem('doominiks_theme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                const icon = document.getElementById('theme-icon');
                if (icon) icon.className = 'fas fa-sun';
            }
        }
        initTheme();

        // ===================== CROSS-TAB REAL-TIME SYNC =====================
        // Sinkronisasi stok & ulasan antar tab yang terbuka
        window.addEventListener('storage', function(e) {
            if (e.key === 'doominiks_store' && e.newValue) {
                try {
                    const newData = JSON.parse(e.newValue);
                    // Update produk (stok berubah)
                    if (newData.products) {
                        store.products = newData.products;
                        // Re-render grid produk jika sedang tampil
                        const grid = document.getElementById('products-grid');
                        if (grid) grid.innerHTML = store.products.map(p => renderProductCard(p)).join('');
                    }
                    // Update ulasan jika halaman ulasan sedang terbuka
                    if (newData.reviews) {
                        store.reviews = newData.reviews;
                        const reviewsList = document.getElementById('reviews-list');
                        if (reviewsList && store.reviews.length > 0) {
                            reviewsList.innerHTML = store.reviews.slice().reverse().map(r => renderReviewCard(r)).join('');
                        }
                    }
                } catch(err) {}
            }
        });

        // ===================== WISHLIST =====================
        function toggleWishlist(productId, btnEl) {
            if (!store.currentUser) {
                showToast('Login dulu untuk menyimpan wishlist!', 'warn');
                return showModal('login');
            }
            const user = store.users[store.currentUser];
            if (!user.wishlist) user.wishlist = [];
            const idx = user.wishlist.indexOf(productId);
            if (idx === -1) {
                user.wishlist.push(productId);
                btnEl.classList.add('wishlisted');
                btnEl.querySelector('i').className = 'fas fa-heart';
                btnEl.title = 'Hapus dari Wishlist';
                showToast('Ditambahkan ke Wishlist ❤️', 'success', 2500);
            } else {
                user.wishlist.splice(idx, 1);
                btnEl.classList.remove('wishlisted');
                btnEl.querySelector('i').className = 'far fa-heart';
                btnEl.title = 'Tambah ke Wishlist';
                showToast('Dihapus dari Wishlist', 'info', 2000);
            }
            saveStore();
        }

        function renderWishlistPage() {
            if (!store.currentUser) { showPage('home'); return ''; }
            const user = store.users[store.currentUser];
            const wishlistIds = user.wishlist || [];
            const wishlistProducts = store.products.filter(p => wishlistIds.includes(p.id));
            return `
                <div class="fade-in">
                    <div class="flex items-center gap-4 mb-8">
                        <button onclick="showPage('profile')" class="text-zinc-400 hover:text-white">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h1 class="text-3xl font-bold"><i class="fas fa-heart text-red-500 mr-2"></i>Wishlist Saya</h1>
                        <span class="text-zinc-500 text-sm">(${wishlistProducts.length} produk)</span>
                    </div>
                    ${wishlistProducts.length > 0 ? `
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${wishlistProducts.map(p => renderProductCard(p)).join('')}
                        </div>
                    ` : `
                        <div class="card card-glow p-16 text-center text-zinc-500">
                            <i class="far fa-heart text-5xl mb-4"></i>
                            <p class="text-lg mb-2">Wishlist masih kosong</p>
                            <p class="text-sm mb-6">Tap ikon ❤️ di produk untuk menyimpannya</p>
                            <button onclick="showPage('products')" class="btn-primary">Jelajahi Produk</button>
                        </div>
                    `}
                </div>
            `;
        }
    </script>
</body>
</html>
